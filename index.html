<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>01DeadInside — Фантом</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --gradient-main: linear-gradient(135deg, #0A0A0A 0%, #1A1A2E 25%, #16213E 50%, #0F3460 75%, #1A1A2E 100%);
      --accent-lavender: #A78BFA;
      --accent-mint: #7EC8A3;
      --accent-vk: #4A76A8;
      --accent-telegram: #2AABEE;
      --accent-discord: #5865F2;
      --glass-bg: rgba(255, 255, 255, 0.06);
      --glass-bg-hover: rgba(255, 255, 255, 0.12);
      --glass-border: 1px solid rgba(255, 255, 255, 0.08);
      --glass-border-hover: 1px solid rgba(255, 255, 255, 0.2);
      --glass-blur: blur(40px) saturate(180%);
      --shadow-glass: 0 30px 80px rgba(0, 0, 0, 0.5);
      --shadow-glass-hover: 0 40px 100px rgba(0, 0, 0, 0.6);
      --shadow-inner: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      --text-dark: #1C1C1E;
      --text-light: #FFFFFF;
      --text-muted: rgba(255, 255, 255, 0.5);
      --radius-glass: 28px;
      --radius-avatar: 50%;
      --transition-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --transition-bounce: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      background: var(--gradient-main);
      color: var(--text-dark);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      cursor: default;
      user-select: none;
    }

    .live-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: var(--gradient-main);
      background-size: 400% 400%;
      animation: gradientShift 18s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 0%; }
      25% { background-position: 50% 100%; }
      50% { background-position: 100% 50%; }
      75% { background-position: 0% 100%; }
      100% { background-position: 100% 0%; }
    }

    .nebula {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }

    .nebula .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(150px);
      opacity: 0.2;
      animation: nebulaFloat 25s infinite alternate ease-in-out;
    }

    .nebula .orb-1 {
      width: 80vmax;
      height: 80vmax;
      top: -30%;
      left: -20%;
      background: radial-gradient(circle, #A78BFA, transparent 70%);
    }

    .nebula .orb-2 {
      width: 70vmax;
      height: 70vmax;
      bottom: -30%;
      right: -20%;
      background: radial-gradient(circle, #0F3460, transparent 70%);
    }

    .nebula .orb-3 {
      width: 50vmax;
      height: 50vmax;
      top: 40%;
      left: 30%;
      background: radial-gradient(circle, #7EC8A3, transparent 70%);
      animation-delay: 8s;
    }

    @keyframes nebulaFloat {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(50px, -50px) scale(1.1); }
      66% { transform: translate(-40px, 40px) scale(0.9); }
      100% { transform: translate(20px, -20px) scale(1.05); }
    }

    .particle-container {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 10px rgba(167, 139, 250, 0.05);
      animation: particleFloat linear infinite;
    }

    @keyframes particleFloat {
      0% { transform: translateY(100vh) scale(0.3); opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    @media (hover: hover) and (pointer: fine) {
      body { cursor: none !important; }
      
      .custom-cursor {
        position: fixed;
        pointer-events: none;
        z-index: 99999;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        border: 2px solid rgba(167, 139, 250, 0.5);
        box-shadow: 0 0 30px rgba(167, 139, 250, 0.1);
        transform: translate(-50%, -50%);
        transition: width 0.3s, height 0.3s, background 0.3s, border-color 0.3s;
      }

      .custom-cursor.hovered {
        width: 40px;
        height: 40px;
        background: rgba(167, 139, 250, 0.15);
        border-color: rgba(167, 139, 250, 0.8);
        backdrop-filter: blur(4px);
      }

      .custom-cursor.pulse {
        animation: cursorPulse 0.3s var(--transition-bounce);
      }
    }

    @keyframes cursorPulse {
      0% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(0.75); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    @media (hover: none) and (pointer: coarse) {
      .custom-cursor { display: none !important; }
    }

    .splash-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gradient-main);
      transition: opacity 0.6s ease, transform 0.6s var(--transition-smooth);
    }

    .splash-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(167, 139, 250, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .splash-card {
      position: relative;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow-glass), var(--shadow-inner);
      border-radius: var(--radius-glass);
      padding: 4rem 6rem;
      text-align: center;
      animation: splashEnter 0.6s var(--transition-bounce) forwards;
      opacity: 0;
      transform: scale(0.95);
    }

    @keyframes splashEnter {
      to { opacity: 1; transform: scale(1); }
    }

    .splash-card h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(50px, 8vw, 70px);
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--text-light);
      text-shadow: 0 4px 40px rgba(0,0,0,0.3);
      margin-bottom: 0.2rem;
      line-height: 1;
    }

    .splash-card .badge {
      display: inline-block;
      margin-top: 0.8rem;
      padding: 0.3rem 1.5rem;
      background: rgba(167, 139, 250, 0.15);
      border: 1px solid rgba(167, 139, 250, 0.2);
      border-radius: 60px;
      font-size: clamp(0.8rem, 1.2vw, 1rem);
      font-weight: 500;
      color: var(--accent-lavender);
      letter-spacing: 2px;
    }

    .splash-card p {
      font-size: clamp(14px, 2vw, 18px);
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 2px;
      margin-top: 0.3rem;
      animation: subtlePulse 2s ease-in-out infinite;
    }

    @keyframes subtlePulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 0.9; transform: scale(1.02); }
    }

    .splash-overlay.hide-splash {
      opacity: 0;
      transform: scale(0.95);
      pointer-events: none;
    }

    .main-page {
      display: none;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: var(--gradient-main);
      position: relative;
    }

    .main-page.visible {
      display: flex;
      flex-direction: column;
      animation: fadeInMain 0.8s ease forwards;
    }

    @keyframes fadeInMain {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .video-section {
      position: relative;
      flex: 0 0 55vh;
      width: 100%;
      overflow: hidden;
    }

    .bg-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.7;
      filter: brightness(0.75) saturate(1.1) contrast(1.05);
      mix-blend-mode: normal;
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(180deg, rgba(10, 10, 10, 0.05) 0%, rgba(10, 10, 10, 0.02) 50%, rgba(10, 10, 10, 0.25) 100%);
      pointer-events: none;
    }

    .content-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 2rem 2.5rem;
      position: relative;
      z-index: 2;
      margin-top: -70px;
      gap: 1.2rem;
    }

    .avatar-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      animation: staggerFade 0.8s 0.2s both;
    }

    @keyframes staggerFade {
      from { opacity: 0; transform: scale(0.9) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .avatar {
      width: 140px;
      height: 140px;
      border-radius: var(--radius-avatar);
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      transition: transform 0.4s var(--transition-smooth);
    }

    .avatar:hover { transform: scale(1.04) rotate(1deg); }

    .avatar-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
      text-align: center;
    }

    .avatar-info .nick {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 700;
      font-style: italic;
      letter-spacing: 2px;
      color: var(--text-light);
      text-shadow: 0 4px 30px rgba(0,0,0,0.4);
      line-height: 1.1;
    }

    .avatar-info .username {
      font-size: clamp(0.8rem, 1.2vw, 1rem);
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 2px;
      opacity: 0.8;
    }

    .avatar-info .role {
      margin-top: 0.2rem;
      padding: 0.2rem 1.2rem;
      background: rgba(167, 139, 250, 0.12);
      border: 1px solid rgba(167, 139, 250, 0.15);
      border-radius: 60px;
      font-size: clamp(0.7rem, 0.9vw, 0.8rem);
      font-weight: 500;
      color: var(--accent-lavender);
      letter-spacing: 1.5px;
    }

    .buttons-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      animation: staggerFade 0.8s 0.4s both;
      max-width: 550px;
    }

    .btn-glass {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 110px;
      height: 110px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-glass);
      cursor: none;
      transition: all 0.4s var(--transition-bounce);
      color: var(--text-light);
      gap: 0.5rem;
      text-decoration: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      opacity: 0;
      transform: translateY(20px) scale(0.95);
      animation: staggerFade 0.6s var(--transition-bounce) forwards;
    }

    .btn-glass:nth-child(1) { animation-delay: 0.1s; }
    .btn-glass:nth-child(2) { animation-delay: 0.2s; }
    .btn-glass:nth-child(3) { animation-delay: 0.3s; }

    .btn-glass:hover {
      transform: translateY(-4px) scale(1.05);
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2), 0 0 30px rgba(167, 139, 250, 0.05);
    }

    .btn-glass:active {
      transform: scale(0.93);
      transition-duration: 0.1s;
    }

    .btn-glass i {
      font-size: 2.2rem;
      transition: transform 0.4s ease;
    }

    .btn-glass:hover i {
      transform: scale(1.1);
    }

    .btn-glass span {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.7);
    }

    .btn-glass .sub {
      font-size: 0.6rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.5px;
    }

    .btn-telegram i { color: var(--accent-telegram); }
    .btn-telegram:hover { border-color: rgba(42, 171, 238, 0.4); box-shadow: 0 12px 40px rgba(42, 171, 238, 0.1); }

    .btn-vk i { color: var(--accent-vk); }
    .btn-vk:hover { border-color: rgba(74, 118, 168, 0.4); box-shadow: 0 12px 40px rgba(74, 118, 168, 0.1); }

    .btn-discord i { color: var(--accent-discord); }
    .btn-discord:hover { border-color: rgba(88, 101, 242, 0.4); box-shadow: 0 12px 40px rgba(88, 101, 242, 0.1); }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(20, 20, 25, 0.9);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 0.7rem 1.8rem;
      color: var(--text-light);
      font-size: 0.85rem;
      font-weight: 400;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      z-index: 10000;
      opacity: 0;
      transition: all 0.5s var(--transition-bounce);
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast i {
      font-size: 1.1rem;
      color: var(--accent-lavender);
    }

    @media (max-width: 768px) {
      .splash-card { padding: 3rem 2rem; width: 85%; min-width: unset; }
      .splash-card h1 { font-size: clamp(40px, 10vw, 50px); }
      
      .video-section { flex: 0 0 35vh; }
      .content-section { margin-top: -50px; padding: 1rem 1.5rem 1.8rem; gap: 0.8rem; }
      
      .avatar { width: 110px; height: 110px; }
      .avatar-info .nick { font-size: clamp(1.4rem, 5vw, 2rem); }
      
      .btn-glass { width: 90px; height: 90px; }
      .btn-glass i { font-size: 1.8rem; }
      .btn-glass span { font-size: 0.65rem; }
      
      .toast { padding: 0.6rem 1.2rem; font-size: 0.8rem; bottom: 20px; }
    }

    @media (max-width: 480px) {
      .splash-card h1 { font-size: 32px; }
      .splash-card { padding: 2rem 1.5rem; }
      .avatar { width: 90px; height: 90px; }
      .btn-glass { width: 75px; height: 75px; }
      .btn-glass i { font-size: 1.5rem; }
      .btn-glass span { font-size: 0.55rem; }
      .btn-glass .sub { display: none; }
    }
  </style>
</head>
<body>

  <div class="live-bg"></div>
  <div class="nebula">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="particle-container" id="particleContainer"></div>

  <div class="custom-cursor" id="customCursor"></div>

  <div class="splash-overlay" id="splashOverlay">
    <div class="splash-card">
      <h1>01DeadInside</h1>
      <div class="badge">👻 Фантом</div>
      <p>@minicatts</p>
    </div>
  </div>

  <div class="main-page" id="mainPage">
    <div class="video-section">
      <video class="bg-video" src="bdimngdttf.mp4" autoplay loop muted playsinline></video>
      <div class="video-overlay"></div>
    </div>

    <div class="content-section">
      <div class="avatar-block">
        <img src="image.png" alt="01DeadInside" class="avatar">
        <div class="avatar-info">
          <div class="nick">01DeadInside</div>
          <div class="username">@minicatts</div>
          <div class="role">👻 Фантом</div>
        </div>
      </div>

      <div class="buttons-container">
        <a class="btn-glass btn-telegram" href="https://t.me/minicatts" target="_blank">
          <i class="fab fa-telegram-plane"></i>
          <span>Telegram</span>
          <span class="sub">@minicatts</span>
        </a>
        
        <a class="btn-glass btn-vk" href="https://vk.com/billa666" target="_blank">
          <i class="fab fa-vk"></i>
          <span>VK</span>
          <span class="sub">@billa666</span>
        </a>
        
        <a class="btn-glass btn-discord" href="https://discord.com/users/123456789012345678" target="_blank">
          <i class="fab fa-discord"></i>
          <span>Discord</span>
          <span class="sub">nemorovvv</span>
        </a>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage">Готово</span>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const particleContainer = document.getElementById('particleContainer');
      const isMobile = window.innerWidth <= 768;
      const particleCount = isMobile ? 15 : 25;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        const size = Math.random() * 5 + 2;
        const posX = Math.random() * 100;
        const duration = Math.random() * 25 + 20;
        const delay = Math.random() * 20;
        const opacity = Math.random() * 0.15 + 0.03;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = posX + '%';
        particle.style.opacity = opacity;
        particle.style.animationDuration = duration + 's';
        particle.style.animationDelay = delay + 's';
        particleContainer.appendChild(particle);
      }

      const cursor = document.getElementById('customCursor');
      const hasMouse = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

      if (hasMouse && cursor) {
        document.addEventListener('mousemove', function(e) {
          cursor.style.left = e.clientX + 'px';
          cursor.style.top = e.clientY + 'px';
        });
        document.querySelectorAll('button, a, .splash-card').forEach(el => {
          el.addEventListener('mouseenter', () => cursor.classList.add('hovered'));
          el.addEventListener('mouseleave', () => cursor.classList.remove('hovered'));
          el.addEventListener('mousedown', () => {
            cursor.classList.add('pulse');
            setTimeout(() => cursor.classList.remove('pulse'), 300);
          });
        });
      }

      const splash = document.getElementById('splashOverlay');
      splash.addEventListener('click', function() {
        this.classList.add('hide-splash');
        setTimeout(() => {
          this.style.display = 'none';
          document.getElementById('mainPage').classList.add('visible');
          document.body.style.overflow = 'auto';
        }, 600);
      });
    });
  </script>
</body>
</html>
